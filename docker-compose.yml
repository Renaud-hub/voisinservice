version: '3.9'

services:
  # ── MongoDB ──────────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: voisinservice_mongo
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: VoisinMongo2024!
      MONGO_INITDB_DATABASE: voisinservice
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    networks:
      - vs_network

  # ── Backend (Node.js / Express) ──────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: voisinservice_backend
    restart: always
    env_file: .env
    environment:
      NODE_ENV: production
      MONGODB_URI: mongodb://admin:VoisinMongo2024!@mongo:27017/voisinservice?authSource=admin
      PORT: 5000
    depends_on:
      - mongo
    ports:
      - "5000:5000"
    volumes:
      - uploads_data:/app/uploads
    networks:
      - vs_network

  # ── Frontend (React → Nginx) ─────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    container_name: voisinservice_frontend
    restart: always
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    networks:
      - vs_network

volumes:
  mongo_data:
  uploads_data:

networks:
  vs_network:
    driver: bridge
